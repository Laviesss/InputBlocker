# InputBlocker Configuration
# Created by Laviesss
# Format: x1,y1,x2,y2 (top-left to bottom-right coordinates)
# Lines starting with # are comments

# Module enabled flag (1=enable, 0=disable)
enabled=1

# Crash protection flag (1=unexpected shutdown detected, 0=normal)
# When 1, module starts disabled on next boot for safety
force_safe_mode=0

# Kill switch: Vol Down x3 -> Vol Up x3 (within 5 seconds) disables blocking
# This works even if blocking is preventing screen interaction

# Add blocked regions below (one per line):
# Format: x1,y1,x2,y2
# Example: 0,0,100,200 blocks top-left 100x200 area
# Example: 980,1720,1080,1920 blocks bottom-right corner (common ghost tap area)
