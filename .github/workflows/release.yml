name: "🚀 Release Pipeline"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '🏗️ Components to build (Tip: "all" is recommended for full releases)'
        required: true
        default: all
        type: choice
        options: [all, android, csharp, java, module]
      version:
        description: '🏷️ Custom version (e.g., v1.0.1)'
        required: false
        default: ''
      version_code:
        description: '🔢 Manual version code (Tip: Leave empty to auto-generate from git history)'
        required: false
        default: ''
      release_notes:
        description: '📝 Release notes (Markdown supported)'
        required: false
        default: ''
      draft:
        description: '🧪 Create as a Draft?'
        required: false
        default: false
        type: boolean
      prerelease:
        description: '⚠️ Mark as Pre-release?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_NAME: InputBlocker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  setup:
    name: "⚙️ Setup & Versioning"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      clean_version: ${{ steps.vars.outputs.clean_version }}
      version_code: ${{ steps.vars.outputs.version_code }}
      build_type: ${{ steps.vars.outputs.build_type }}
      draft: ${{ steps.vars.outputs.draft }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "🔧 Generate variables"
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"
            BUILD_TYPE="all"
          else
            VERSION="${{ github.event.inputs.version }}"
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          fi
          [[ -z "$VERSION" ]] && VERSION="v0.0.0-dev"
          VERSION=$(echo "$VERSION" | tr -d '\r' | xargs)
          [[ "$VERSION" != v* ]] && VERSION="v${VERSION}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "::error::Invalid version format: $VERSION (expected e.g. 1.2.3 or v1.2.3)"
            exit 1
          fi
          CLEAN_VERSION="${VERSION#v}"
          if [[ -n "${{ github.event.inputs.version_code }}" ]]; then
            VCODE="${{ github.event.inputs.version_code }}"
          else
            VER_PARTS="${CLEAN_VERSION%%[-+]*}"
            MAJOR=$(echo "$VER_PARTS" | cut -d. -f1)
            MINOR=$(echo "$VER_PARTS" | cut -d. -f2)
            PATCH=$(echo "$VER_PARTS" | cut -d. -f3)
            VCODE=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          fi
          VCODE=$(echo "$VCODE" | tr -dc '0-9')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VCODE" >> "$GITHUB_OUTPUT"
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"
          echo "draft=${{ github.event.inputs.draft || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ github.event.inputs.prerelease || 'false' }}" >> "$GITHUB_OUTPUT"

  inject-version:
    name: "💉 Inject Versions"
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "🖊️ Patching source files"
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.setup.outputs.version }}"
          CLEAN_VERSION="${{ needs.setup.outputs.clean_version }}"
          VCODE="${{ needs.setup.outputs.version_code }}"

          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module/module.prop
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" module/update.json
          sed -i "s/\"versionCode\": [0-9]*/\"versionCode\": $VCODE/" module/update.json

          sed -i "s/versionName = \".*\"/versionName = \"$CLEAN_VERSION\"/" android-app/app/build.gradle
          sed -i "s/versionCode = [0-9]*/versionCode = $VCODE/" android-app/app/build.gradle

          sed -i "s/version = '.*/version = '$CLEAN_VERSION'/" pc-tool-java/build.gradle
          sed -i "s/<Version>.*<\/Version>/<Version>$CLEAN_VERSION<\/Version>/" pc-tool-csharp/InputBlockerSetup.csproj
      - uses: actions/upload-artifact@v4
        with:
          name: versioned-files
          path: |
            module/module.prop
            module/update.json
            android-app/app/build.gradle
            pc-tool-java/build.gradle
            pc-tool-csharp/InputBlockerSetup.csproj

  build-android:
    name: "🤖 Build Android"
    needs: [setup, inject-version]
    if: contains(fromJSON('["all", "android", "module"]'), needs.setup.outputs.build_type)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: "🔨 Assemble Release APK"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT || '/usr/local/lib/android/sdk' }}
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Dorg.gradle.java.home="$JAVA_HOME" \
            --no-daemon \
            --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-apk
          path: android-app/app/build/outputs/apk/release/*.apk

  sign-android:
    name: "✍️ Sign Android APK"
    needs: [setup, build-android]
    if: contains(fromJSON('["all", "android", "module"]'), needs.setup.outputs.build_type)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: unsigned-apk
          path: unsigned
      - name: "🔏 Sign with apksigner"
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          set -euo pipefail

          echo "$SIGNING_KEY" | base64 -d > keystore.jks

          APKSIGNER=$(find "${ANDROID_HOME:-/usr/local/lib/android/sdk}/build-tools" \
            -name "apksigner" -type f | sort -V | tail -1)
          if [[ -z "$APKSIGNER" ]]; then
            echo "::error::apksigner not found. Available build-tools:"
            ls "${ANDROID_HOME:-/usr/local/lib/android/sdk}/build-tools/" || true
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER"

          APK=$(find unsigned -name "*.apk" | head -n 1)
          mkdir -p signed

          "$APKSIGNER" sign \
            --ks keystore.jks \
            --ks-pass "pass:${KEY_STORE_PASSWORD}" \
            --ks-key-alias "${ALIAS}" \
            --key-pass "pass:${KEY_PASSWORD}" \
            --out "signed/app-release-signed.apk" \
            "$APK"

          "$APKSIGNER" verify --verbose "signed/app-release-signed.apk"
      - name: "📦 Finalizing APK"
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          mkdir -p release
          mv signed/app-release-signed.apk "release/InputBlocker-${VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: release/*.apk

  build-csharp:
    name: "🖥️ Build C# (Desktop)"
    needs: [setup, inject-version]
    if: contains(fromJSON('["all", "csharp"]'), needs.setup.outputs.build_type)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: "🚀 Multi-Platform Publish"
        run: |
          mkdir -p release/csharp
          cd pc-tool-csharp

          publish_platform() {
            local rid=$1
            local out_dir="../release/csharp/$rid"
            mkdir -p "$out_dir"
            dotnet publish InputBlockerSetup.csproj \
              -c Release \
              -r "$rid" \
              --self-contained true \
              -p:PublishSingleFile=true \
              -o "$out_dir"
            if [[ "$rid" == win* ]]; then
              mv "$out_dir/InputBlockerSetup.exe" "$out_dir/InputBlockerSetup-$rid.exe"
            else
              mv "$out_dir/InputBlockerSetup" "$out_dir/InputBlockerSetup-$rid"
            fi
          }

          publish_platform "win-x64"
          publish_platform "win-arm64"
          publish_platform "linux-x64"
          publish_platform "linux-arm64"
          publish_platform "osx-x64"
          publish_platform "osx-arm64"

      - uses: actions/upload-artifact@v4
        with:
          name: csharp
          path: release/csharp/

  build-java:
    name: "☕ Build Java (Legacy)"
    needs: [setup, inject-version]
    if: contains(fromJSON('["all", "java"]'), needs.setup.outputs.build_type)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: "🔨 Build JAR"
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          cd pc-tool-java
          chmod +x gradlew
          ./gradlew assemble
          mkdir -p ../release/java
          cp build/libs/*.jar "../release/java/InputBlockerSetup-${VERSION}.jar"
      - uses: actions/upload-artifact@v4
        with:
          name: java
          path: release/java/

  build-module:
    name: "📦 Build Root Module"
    needs: [setup, sign-android]
    if: contains(fromJSON('["all", "module"]'), needs.setup.outputs.build_type)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: signed-apk
          path: signed-apk
      - name: "🎁 Packaging ZIP"
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          APK=$(find signed-apk -name "*.apk" | head -n 1)
          cp "$APK" module/common/InputBlocker.apk
          mkdir -p release
          cd module
          zip -r "../release/InputBlocker-${VERSION}.zip" .
      - uses: actions/upload-artifact@v4
        with:
          name: module
          path: release/*.zip

  checksums:
    name: "🔢 Generate Checksums"
    needs: [setup, sign-android, build-csharp, build-java, build-module]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: "🧮 Calculating SHA256"
        run: |
          mkdir -p release
          cd artifacts
          find . -type f -exec bash -c 'cd "$(dirname "$1")" && sha256sum "$(basename "$1")"' _ {} \; > ../release/checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/checksums.txt

  release:
    name: "🚀 GitHub Release"
    needs: [setup, sign-android, build-csharp, build-java, build-module, checksums]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: "📂 Flattening Assets"
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.apk" -o -name "*.zip" -o -name "*.jar" -o -name "InputBlockerSetup-*" -o -name "checksums.txt" \) -exec cp {} release/ \;
      - name: "🎉 Publishing Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: "✨ InputBlocker ${{ needs.setup.outputs.version }}"
          body: ${{ github.event.inputs.release_notes || '🚀 Automated production release.' }}
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "📄 Update Manifest"
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          VCODE="${{ needs.setup.outputs.version_code }}"
          mkdir -p gh-pages
          cat > gh-pages/update.json <<EOF
          {
            "version": "$VERSION",
            "versionCode": $VCODE,
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/InputBlocker-${VERSION}.zip",
            "changelog": "https://github.com/${{ github.repository }}/releases/tag/${VERSION}",
            "support": ["Magisk", "KernelSU", "APatch"],
            "minApi": 23
          }
          EOF
      - name: "🌐 Deploy to GitHub Pages"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: gh-pages
          clean: true
          single-commit: true
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
          token: ${{ secrets.GITHUB_TOKEN }}