name: "Production Release Pipeline"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name – semver X.Y.Z (e.g. 1.2.3)'
        required: true
      version_code:
        description: 'Version Code override (integer). Leave blank to auto‑calculate.'
        required: false
        default: ''
      release_notes:
        description: 'Release notes (Markdown)'
        required: false
        default: ''
      draft:
        description: 'Create release as a draft?'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as a pre‑release?'
        required: false
        default: false
        type: boolean
      build_android:
        description: 'Build Android APK + Root Module ZIP'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build PC Tool – Windows (.exe)'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build PC Tool – Linux (.AppImage)'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build PC Tool – macOS (.dmg)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ============================================================
  # 1. VALIDATE & PREPARE
  # ============================================================
  validate-release:
    name: "Validate Version & Prepare Release Notes"
    runs-on: ubuntu-latest
    outputs:
      version_name:  ${{ steps.resolve-version.outputs.VERSION_NAME }}
      version_code:  ${{ steps.resolve-version.outputs.VERSION_CODE }}
      tag_name:      ${{ steps.resolve-version.outputs.TAG_NAME }}
      release_notes: ${{ steps.generate-notes.outputs.BODY }}
      started_at:    ${{ steps.resolve-version.outputs.STARTED_AT }}

    steps:
      - name: "Checkout repository (full history for changelog)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Resolve & Validate Version Number"
        id: resolve-version
        shell: pwsh
        run: |
          $version_name     = "${{ github.event.inputs.version_name }}"
          $version_code_raw = "${{ github.event.inputs.version_code }}"

          # Tag‑triggered run: extract version from the tag itself
          if ("${{ github.event_name }}" -eq "push") {
            $version_name = "${{ github.ref_name }}".TrimStart('v')
          }

          if ([string]::IsNullOrWhiteSpace($version_name)) {
            throw "FATAL: version_name is required."
          }

          if ($version_name -notmatch '^\d+\.\d+\.\d+$') {
            throw "FATAL: '$version_name' is not a valid semver (X.Y.Z)."
          }

          $parts = $version_name -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          if (-not [string]::IsNullOrWhiteSpace($version_code_raw)) {
            $version_code = [int]$version_code_raw
          } else {
            $version_code = ($major * 10000) + ($minor * 100) + $patch
          }

          $started_at = (Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")

          echo "VERSION_NAME=$version_name" >> $env:GITHUB_OUTPUT
          echo "VERSION_CODE=$version_code" >> $env:GITHUB_OUTPUT
          echo "TAG_NAME=v$version_name"    >> $env:GITHUB_OUTPUT
          echo "STARTED_AT=$started_at"     >> $env:GITHUB_OUTPUT

      - name: "Guard Against Duplicate Releases"
        shell: bash
        run: |
          TAG="${{ steps.resolve-version.outputs.TAG_NAME }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$STATUS" = "200" ]; then
            echo "::error::A release for $TAG already exists. Aborting."
            exit 1
          fi

      - name: "Check Version Code Regression"
        shell: bash
        run: |
          NEW_CODE=${{ steps.resolve-version.outputs.VERSION_CODE }}
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/update.json"
          if curl -sf "$PAGES_URL" -o live_update.json; then
            LIVE_CODE=$(jq -r '.versionCode' live_update.json)
            if [ "$NEW_CODE" -le "$LIVE_CODE" ]; then
              echo "::error::Version code regression: new=$NEW_CODE <= live=$LIVE_CODE"
              exit 1
            fi
          else
            echo "No existing update.json found – regression check skipped."
          fi

      - name: "Generate Release Notes"
        id: generate-notes
        shell: pwsh
        run: |
          $v = "${{ steps.resolve-version.outputs.VERSION_NAME }}"
          $c = "${{ steps.resolve-version.outputs.VERSION_CODE }}"
          $manual = "${{ github.event.inputs.release_notes }}"

          if (-not [string]::IsNullOrWhiteSpace($manual)) {
            $body = $manual
          } else {
            $prev = git describe --tags --abbrev=0 HEAD^ 2>$null
            if ($prev) {
              $log = git log "$prev..HEAD" --pretty=format:"- %s" --no-merges
              $header = "## What's Changed (since $prev)"
            } else {
              $log = git log --pretty=format:"- %s" --no-merges -20
              $header = "## What's Changed"
            }
            $body = "$header`n$log"
          }

          $footer = "`n`n---`n### Requirements`n| | |`n|---|---|`n| **Root** | Magisk / KernelSU / APatch / SuperSU |`n| **Framework** | LSPosed (recommended) |`n| **Android** | 6.0+ (API 23) |`n| **Version Code** | $c |"
          $body = $body + $footer

          echo "BODY<<EOF" >> $env:GITHUB_OUTPUT
          echo $body >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT


  # ============================================================
  # 2. UNIT TESTS
  # ============================================================
  run-unit-tests:
    name: "Run Unit Tests"
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Make Gradlew Executable"
        run: chmod +x gradlew

      - name: "Execute Unit Tests"
        run: ./gradlew test --configuration-cache

      - name: "Upload Test Reports"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          retention-days: 7


  # ============================================================
  # 3. BUILD PC TOOL (Windows / Linux / macOS matrix)
  # ============================================================
  build-pc-tool:
    name: "Build PC Tool – ${{ matrix.label }}"
    needs: [validate-release, run-unit-tests]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      needs.run-unit-tests.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: pc-tool-windows
            file_glob: "*.exe"
          - os: ubuntu-latest
            label: Linux
            artifact_name: pc-tool-linux
            file_glob: "*.AppImage"
          - os: macos-latest
            label: macOS
            artifact_name: pc-tool-macos
            file_glob: "*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Make Gradlew Executable"
        run: chmod +x gradlew

      - name: "Build ${{ matrix.label }} Distribution"
        id: build-pc
        if: |
          github.event_name == 'push' ||
          (matrix.label == 'Windows' && github.event.inputs.build_windows == 'true') ||
          (matrix.label == 'Linux'   && github.event.inputs.build_linux == 'true')   ||
          (matrix.label == 'macOS'   && github.event.inputs.build_macos == 'true')
        shell: bash
        run: |
          ./gradlew buildPC \
            --configuration-cache \
            -PVERSION_NAME="${{ needs.validate-release.outputs.version_name }}" \
            -PVERSION_CODE=${{ needs.validate-release.outputs.version_code }}

      - name: "Upload ${{ matrix.label }} Artifact"
        if: steps.build-pc.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pc-tool-kotlin/build/compose/binaries/${{ matrix.file_glob }}


  # ============================================================
  # 4. BUILD ANDROID APK & ROOT MODULE ZIP
  # ============================================================
  build-android:
    name: "Build Android APK + Root Module"
    needs: [validate-release, run-unit-tests]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      needs.run-unit-tests.result == 'success' &&
      (github.event_name == 'push' || github.event.inputs.build_android == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Java 17"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Make Gradlew Executable"
        run: chmod +x gradlew

      - name: "Prepare APK Signing (if secrets available)"
        id: signing-prep
        shell: bash
        run: |
          MISSING=""
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then MISSING="KEYSTORE_BASE64"; fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then MISSING="$MISSING KEYSTORE_PASSWORD"; fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then MISSING="$MISSING KEY_ALIAS"; fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then MISSING="$MISSING KEY_PASSWORD"; fi

          if [ -n "$MISSING" ]; then
            echo "::error::APK signing is required for a release, but these secrets are missing: $MISSING"
            exit 1
          fi

          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "KEYSTORE_FILE=release.keystore" >> $GITHUB_ENV

      - name: "Build Android APK & Root Module ZIP (signed)"
        run: |
          ./gradlew buildAndroid buildModule \
            --configuration-cache \
            -PVERSION_NAME="${{ needs.validate-release.outputs.version_name }}" \
            -PVERSION_CODE=${{ needs.validate-release.outputs.version_code }} \
            -PSIGN_APK=true \
            -PMYAPP_RELEASE_STORE_FILE=${{ env.KEYSTORE_FILE }} \
            -PMYAPP_RELEASE_STORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}" \
            -PMYAPP_RELEASE_KEY_ALIAS="${{ secrets.KEY_ALIAS }}" \
            -PMYAPP_RELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: "Upload Android Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android-app/app/build/outputs/apk/release/app-release.apk
            build/distributions/inputblocker.zip


  # ============================================================
  # 5. PUBLISH GITHUB RELEASE & DEPLOY update.json
  # ============================================================
  publish-release:
    name: "Publish Release & Deploy Update"
    needs: [validate-release, build-pc-tool, build-android]
    if: |
      always() &&
      needs.validate-release.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Download All Build Artifacts"
        uses: actions/download-artifact@v4
        with:
          path: raw-artifacts

      - name: "Organise & Rename Artifacts for Release"
        shell: pwsh
        run: |
          $v = "${{ needs.validate-release.outputs.version_name }}"
          $do_android = "${{ github.event.inputs.build_android }}" -ne 'false'
          $do_windows = "${{ github.event.inputs.build_windows }}" -ne 'false'
          $do_linux   = "${{ github.event.inputs.build_linux }}"   -ne 'false'
          $do_macos   = "${{ github.event.inputs.build_macos }}"   -ne 'false'
          if ("${{ github.event_name }}" -eq "push") {
            $do_android = $true; $do_windows = $true; $do_linux = $true; $do_macos = $true
          }

          New-Item -ItemType Directory -Path "release-assets" -Force

          if ($do_android) {
            Copy-Item "raw-artifacts/android-artifacts/app-release.apk"   "release-assets/InputBlocker-v$v.apk"
            Copy-Item "raw-artifacts/android-artifacts/inputblocker.zip" "release-assets/InputBlocker-v$v.zip"
          }
          if ($do_windows) {
            $exe = Get-ChildItem "raw-artifacts/pc-tool-windows/*.exe" | Select-Object -First 1
            if ($exe) { Copy-Item $exe.FullName "release-assets/InputBlockerSetup-v$v.exe" }
          }
          if ($do_linux) {
            $app = Get-ChildItem "raw-artifacts/pc-tool-linux/*.AppImage" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($app) { Copy-Item $app.FullName "release-assets/InputBlockerSetup-v$v.AppImage" }
          }
          if ($do_macos) {
            $dmg = Get-ChildItem "raw-artifacts/pc-tool-macos/*.dmg" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dmg) { Copy-Item $dmg.FullName "release-assets/InputBlockerSetup-v$v.dmg" }
          }

      - name: "Verify Mandatory Artifacts Present"
        shell: pwsh
        run: |
          $v = "${{ needs.validate-release.outputs.version_name }}"
          $do_android = "${{ github.event.inputs.build_android }}" -ne 'false'
          $do_windows = "${{ github.event.inputs.build_windows }}" -ne 'false'
          $is_push = "${{ github.event_name }}" -eq "push"

          $required = @()
          if ($do_android -or $is_push) {
            $required += "release-assets/InputBlocker-v$v.apk"
            $required += "release-assets/InputBlocker-v$v.zip"
          }
          if ($do_windows -or $is_push) {
            $required += "release-assets/InputBlockerSetup-v$v.exe"
          }
          if ($required.Count -eq 0) {
            throw "No artifacts selected for build – nothing to release."
          }

          foreach ($file in $required) {
            if (-not (Test-Path $file)) {
              throw "Missing required artifact: $file"
            }
          }

      - name: "Verify APK Signature"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        shell: bash
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify \
            "release-assets/InputBlocker-v${{ needs.validate-release.outputs.version_name }}.apk"

      - name: "Verify ZIP Integrity"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        shell: bash
        run: |
          unzip -t "release-assets/InputBlocker-v${{ needs.validate-release.outputs.version_name }}.zip"

      - name: "Generate SHA-256 Checksums"
        shell: bash
        run: |
          cd release-assets
          sha256sum * > "checksums-v${{ needs.validate-release.outputs.version_name }}.txt"

      - name: "Upload Final Release Assets (for inspection)"
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-v${{ needs.validate-release.outputs.version_name }}
          path: release-assets/*

      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.tag_name }}
          name: "Release ${{ needs.validate-release.outputs.tag_name }}"
          body: ${{ needs.validate-release.outputs.release_notes }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          prerelease: ${{ github.event.inputs.prerelease || 'false' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Deploy update.json for in‑app updater"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        shell: bash
        run: |
          V="${{ needs.validate-release.outputs.version_name }}"
          C="${{ needs.validate-release.outputs.version_code }}"
          REPO="${{ github.repository }}"
          APK_SHA=$(sha256sum "release-assets/InputBlocker-v$V.apk" | awk '{print $1}')
          ZIP_SHA=$(sha256sum "release-assets/InputBlocker-v$V.zip" | awk '{print $1}')
          mkdir -p pages-deploy
          cat > pages-deploy/update.json <<EOF
          {
            "version": "$V",
            "versionCode": $C,
            "apkUrl": "https://github.com/$REPO/releases/download/v$V/InputBlocker-v$V.apk",
            "zipUrl": "https://github.com/$REPO/releases/download/v$V/InputBlocker-v$V.zip",
            "changelog": "${{ needs.validate-release.outputs.release_notes }}",
            "apkSha256": "$APK_SHA",
            "zipSha256": "$ZIP_SHA"
          }
          EOF

      - name: "Publish update.json via GitHub Pages"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-deploy
          keep_files: true
          commit_message: "Deploy update.json for v${{ needs.validate-release.outputs.version_name }}"

      - name: "Create Bug Report on Pipeline Failure"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Release pipeline failed – v${{ needs.validate-release.outputs.version_name }}",
              body: `Pipeline run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ["bug", "release"]
            })
