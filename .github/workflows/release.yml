name: Release

# ============================================================================
# InputBlocker Professional Release Workflow
# A high-fidelity CI/CD pipeline for root-agnostic Android modules.
# ============================================================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '🎯 Components to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - csharp
          - java
          - module
      version:
        description: '🏷️ Custom version (e.g., v1.1.0). Leave blank to use tag'
        required: false
        default: ''
      version_code:
        description: '🔢 Manual Version Code (Override commit count)'
        required: false
        default: ''
      release_notes:
        description: '📝 Custom release notes (Markdown)'
        required: false
        default: ''
      draft:
        description: '📦 Create as draft'
        required: false
        default: 'false'
        type: boolean
      prerelease:
        description: '⚠️ Mark as pre-release'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT_NAME: "InputBlocker"

permissions:
  contents: write

jobs:
  setup:
    name: ⚙️ Setup & Versioning
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      clean_version: ${{ steps.version.outputs.clean_version }}
      version_code: ${{ steps.version.outputs.version_code }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_test: ${{ steps.version.outputs.is_test }}
      build_type: ${{ steps.version.outputs.build_type }}
      draft: ${{ steps.version.outputs.draft }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version and version code
        id: version
        run: |
          set -euo pipefail

          # 1. Determine Version
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="${{ github.event.inputs.version }}"
            [[ -z "$VERSION" ]] && VERSION="v0.0.0-dev"
          fi

          # SANITIZE VERSION: Remove carriage returns, trailing whitespace, and hidden chars
          VERSION=$(echo "$VERSION" | tr -d '\r' | xargs)

          # 2. Determine Clean Version (strip leading 'v' for .NET/Gradle)
          CLEAN_VERSION="${VERSION#v}"
          CLEAN_VERSION=$(echo "$CLEAN_VERSION" | tr -d '\r' | xargs)

          # 3. Determine Version Code
          if [[ -n "${{ github.event.inputs.version_code }}" ]]; then
            VCODE="${{ github.event.inputs.version_code }}"
          else
            # Use commit count as version code
            VCODE=$(git rev-list --count HEAD)
          fi
          # FORCE VCODE TO BE AN INTEGER: Remove decimals and non-numeric chars
          VCODE=$(echo "$VCODE" | sed 's/\.[0-9]*//g' | tr -dc '0-9')
          VCODE=$(echo "$VCODE" | tr -d '\r' | xargs)

          # 4. Determine Release Type
          if [[ "$VERSION" == vtest* ]]; then
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_test=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "is_test=false" >> $GITHUB_OUTPUT
          fi

          # 5. Determine Build Type
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BUILD_TYPE="all"
          else
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          fi

          # Output all values
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VCODE" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "draft=${{ github.event.inputs.draft || 'false' }}" >> $GITHUB_OUTPUT
          echo "prerelease=${{ github.event.inputs.prerelease || 'false' }}" >> $GITHUB_OUTPUT

          echo "🚀 Finalized Version: $VERSION (Clean: $CLEAN_VERSION, Code: $VCODE) | Build: $BUILD_TYPE"

  inject_version:
    name: 💉 Version Injection
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Inject Version into Files
        run: |
          set -euo pipefail
          VERSION='${{ needs.setup.outputs.version }}'
          CLEAN_VERSION='${{ needs.setup.outputs.clean_version }}'
          VCODE='${{ needs.setup.outputs.version_code }}'

          echo "Injecting $VERSION (Clean: $CLEAN_VERSION, Code: $VCODE) into components..."

          # Module files
          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module/module.prop
          sed -i "s/\"version\": \".*\",/\"version\": \"$VERSION\",/" module/update.json
          sed -i "s/\"versionCode\": [0-9]*,/\"versionCode\": $VCODE,/" module/update.json

          # Android app – handle both `versionName = "..."` and `versionName "..."`
          sed -i "s/versionName\s*=?\s*\".*\"/versionName \"$CLEAN_VERSION\"/" android-app/app/build.gradle
          # Android app – handle both `versionCode = 1` and `versionCode 1`
          sed -i "s/versionCode\s*=?\s*[0-9]\+/versionCode $VCODE/" android-app/app/build.gradle

          # C# project
          sed -i "s/<Version>.*<\/Version>/<Version>$CLEAN_VERSION<\/Version>/" pc-tool-csharp/InputBlockerSetup.csproj

      - name: Upload Versioned Source
        uses: actions/upload-artifact@v4
        with:
          name: versioned-files
          path: |
            module/module.prop
            module/update.json
            android-app/app/build.gradle
            pc-tool-csharp/InputBlockerSetup.csproj

  build-android:
    name: 🤖 Build Android APK
    needs: [setup, inject_version]
    if: ${{ needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'android' || needs.setup.outputs.build_type == 'module' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build APK
        run: |
          set -euo pipefail
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Stage APK for release
        run: |
          set -euo pipefail
          VERSION='${{ needs.setup.outputs.version }}'
          mkdir -p release
          cp android-app/app/build/outputs/apk/debug/app-debug.apk "release/InputBlocker-${VERSION}.apk"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/InputBlocker-*.apk

  sign-android:
    name: 🔑 Sign Android APK
    needs: [setup, build-android]
    if: ${{ needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'android' || needs.setup.outputs.build_type == 'module' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Unsigned APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: unsigned
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: unsigned
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-signed
          path: signed/*.apk

  build-csharp:
    name: 💻 Build C# Tools
    needs: [setup, inject_version]
    if: ${{ needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'csharp' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build C# Tools
        run: |
          set -euo pipefail
          mkdir -p release/csharp
          cd pc-tool-csharp
          for rid in win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish -c Release -r "$rid" -o "../release/csharp/$rid" --self-contained true -p:PublishSingleFile=true
            # Prefix every file with the RID to avoid collisions when all artifacts are flattened
            cd "../release/csharp/$rid"
            for file in *; do
              mv "$file" "${rid}_${file}"
            done
            cd -
          done
      - name: Upload C# Binaries
        uses: actions/upload-artifact@v4
        with:
          name: csharp-binaries
          path: release/csharp/

  build-java:
    name: ☕ Build Java Tool
    needs: [setup, inject_version]
    if: ${{ needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'java' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build Java Tool
        run: |
          set -euo pipefail
          VERSION='${{ needs.setup.outputs.version }}'
          cd pc-tool-java
          chmod +x gradlew
          ./gradlew assemble
          mkdir -p ../release/java
          cp build/libs/*.jar "../release/java/InputBlockerSetup-${VERSION}.jar"
      - name: Upload Java Binaries
        uses: actions/upload-artifact@v4
        with:
          name: java-binaries
          path: release/java/

  build-module:
    name: 📦 Package Root Module
    needs: [setup, inject_version, sign-android]
    if: ${{ needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'module' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Download Signed APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-signed
          path: module/common/
      - name: Build Root Module ZIP
        run: |
          set -euo pipefail
          VERSION='${{ needs.setup.outputs.version }}'
          mkdir -p release
          APK_FILE=$(find module/common -name "*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then echo "APK not found!" && exit 1; fi
          cp "$APK_FILE" module/common/InputBlocker.apk
          (cd module && zip -r "../release/InputBlocker-${VERSION}.zip" .)
      - name: Upload Module
        uses: actions/upload-artifact@v4
        with:
          name: root-module
          path: release/InputBlocker-*.zip

  generate-checksums:
    name: 🛡️ Generate Checksums
    needs: [setup, sign-android, build-csharp, build-java, build-module]
    if: ${{ needs.setup.result == 'success' && needs.setup.outputs.build_type == 'all' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      - name: Compute SHA-256
        run: |
          set -euo pipefail
          echo "SHA-256 Checksums" > release/checksums.txt
          echo "=================" >> release/checksums.txt
          find release -type f ! -name "checksums.txt" -exec sha256sum {} + >> release/checksums.txt
      - name: Upload Checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/checksums.txt

  create-release:
    name: 🚀 Create GitHub Release
    needs: [setup, sign-android, build-csharp, build-java, build-module, generate-checksums]
    if: ${{ needs.setup.result == 'success' && needs.setup.outputs.is_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
      - name: Flatten Artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          find release_artifacts -type f -exec cp -v {} release/ \;
          # Remove internal build files and debug symbols that are not release assets
          rm -f release/module.prop release/build.gradle release/*.csproj release/*.pdb release/update.json
          echo "Cleaned internal build files and debug symbols from release artifacts."
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: Release ${{ needs.setup.outputs.version }}
          body: ${{ github.event.inputs.release_notes || 'Automated release generated by CI/CD pipeline.' }}
          draft: ${{ needs.setup.outputs.draft }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          generate_release_notes: true
          files: release/*
      - name: Update Version JSON for Root Managers
        run: |
          set -euo pipefail
          VERSION='${{ needs.setup.outputs.version }}'
          VCODE='${{ needs.setup.outputs.version_code }}'
          ZIP_URL="https://github.com/${{ github.repository }}/releases/latest/download/InputBlocker-${VERSION}.zip"
          
          cat <<EOF > update.json
          {
            "version": "$VERSION",
            "versionCode": $VCODE,
            "zipUrl": "$ZIP_URL",
            "changelog": "https://github.com/${{ github.repository }}/releases",
            "support": ["Magisk", "KernelSU", "APatch"],
            "minApi": 23
          }
          EOF
          echo "Generated update.json for $VERSION"
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          target-folder: .
          branch: gh-pages
          only_deploy_files: |
            update.json
