name: "Production Release Pipeline"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name - must be semver X.Y.Z (e.g., 1.2.3)'
        required: true
      version_code:
        description: 'Version Code override (integer). Leave blank to auto-calculate'
        required: false
        default: ''
      release_notes:
        description: 'Release notes (Markdown)'
        required: false
        default: ''
      draft:
        description: 'Create as a Draft?'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as Pre-release?'
        required: false
        default: false
        type: boolean
      build_android:
        description: 'Build Android APK + Root Module'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build PC Tool - Windows (.exe)'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build PC Tool - Linux (.AppImage)'
        required: false
        default: true
        type: boolean
      build_macos:
        description: 'Build PC Tool - macOS (.dmg)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: "Validate & Pre-flight"
    runs-on: ubuntu-latest
    outputs:
      version_name:  ${{ steps.versioning.outputs.VERSION_NAME }}
      version_code:  ${{ steps.versioning.outputs.VERSION_CODE }}
      tag_name:      ${{ steps.versioning.outputs.TAG_NAME }}
      release_notes: ${{ steps.notes.outputs.BODY }}
      started_at:    ${{ steps.versioning.outputs.STARTED_AT }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Resolve & Validate Version"
        id: versioning
        shell: pwsh
        run: |
          $version_name      = "${{ github.event.inputs.version_name }}"
          $version_code_raw  = "${{ github.event.inputs.version_code }}"

          if ("${{ github.event_name }}" -eq "push") {
              $tag = "${{ github.ref_name }}"
              $version_name = $tag.TrimStart('v')
          }

          if ([string]::IsNullOrWhiteSpace($version_name)) {
              throw "CRITICAL ERROR: VERSION_NAME is missing."
          }

          if ($version_name -notmatch '^\d+\.\d+\.\d+$') {
              throw "CRITICAL ERROR: '$version_name' is not valid semver. Expected format: X.Y.Z (e.g., 1.2.3)."
          }

          $parts = $version_name -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]

          if (-not [string]::IsNullOrWhiteSpace($version_code_raw)) {
              $version_code = [int]$version_code_raw
          } else {
              $version_code = ($major * 10000) + ($minor * 100) + $patch
          }

          $started_at = (Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")

          echo "VERSION_NAME=$version_name" >> $env:GITHUB_OUTPUT
          echo "VERSION_CODE=$version_code" >> $env:GITHUB_OUTPUT
          echo "TAG_NAME=v$version_name"    >> $env:GITHUB_OUTPUT
          echo "STARTED_AT=$started_at"     >> $env:GITHUB_OUTPUT

      - name: "Guard Against Duplicate Releases"
        shell: bash
        run: |
          TAG="${{ steps.versioning.outputs.TAG_NAME }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          if [ "$STATUS" = "200" ]; then
            echo "::error::Release $TAG already exists."
            exit 1
          fi

      - name: "Check Version Code Regression"
        shell: bash
        run: |
          NEW_CODE=${{ steps.versioning.outputs.VERSION_CODE }}
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/update.json"
          if curl -sf "$PAGES_URL" -o update_live.json; then
            LIVE_CODE=$(jq -r '.versionCode' update_live.json)
            if [ "$NEW_CODE" -le "$LIVE_CODE" ]; then
              echo "::error::VERSION_CODE regression: new=$NEW_CODE <= live=$LIVE_CODE"
              exit 1
            fi
          fi

      - name: "Generate Release Notes"
        id: notes
        shell: pwsh
        run: |
          $v = "${{ steps.versioning.outputs.VERSION_NAME }}"
          $c = "${{ steps.versioning.outputs.VERSION_CODE }}"
          $manual = "${{ github.event.inputs.release_notes }}"

          if (-not [string]::IsNullOrWhiteSpace($manual)) {
              $body = $manual
          } else {
              $prev = git describe --tags --abbrev=0 HEAD^ 2>$null
              if ($prev) {
                  $log = git log "$prev..HEAD" --pretty=format:"- %s" --no-merges
                  $header = "## What's Changed (since $prev)"
              } else {
                  $log = git log --pretty=format:"- %s" --no-merges -20
                  $header = "## What's Changed"
              }
              $body = "$header`n$log"
          }

          $footer = "`n`n---`n### Requirements`n| | |`n|---|---|`n| **Root** | Magisk / KernelSU / APatch / SuperSU |`n| **Framework** | LSPosed (recommended) |`n| **Android** | 6.0+ (API 23) |`n| **Version Code** | $c |"
          $body = $body + $footer

          echo "BODY<<EOF" >> $env:GITHUB_OUTPUT
          echo $body >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

  test:
    name: "Run Unit Tests"
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: "Run Tests"
        run: ./gradlew test --configuration-cache
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/'

  build-pc-tool:
    name: "Build PC Tool (${{ matrix.label }})"
    needs: [validate, test]
    if: always() && needs.validate.result == 'success' && needs.test.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact_name: pc-tool-windows
            glob: "*.exe"
          - os: ubuntu-latest
            label: linux
            artifact_name: pc-tool-linux
            glob: "*.AppImage"
          - os: macos-latest
            label: macos
            artifact_name: pc-tool-macos
            glob: "*.dmg"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Build"
        id: build
        if: |
          github.event_name == 'push' ||
          (matrix.label == 'windows' && github.event.inputs.build_windows == 'true') ||
          (matrix.label == 'linux'   && github.event.inputs.build_linux == 'true')   ||
          (matrix.label == 'macos'   && github.event.inputs.build_macos == 'true')
        shell: bash
        run: |
          ./gradlew :pc-tool-kotlin:packageDistributionForCurrentOS \
            --configuration-cache \
            -PVERSION_NAME="${{ needs.validate.outputs.version_name }}" \
            -PVERSION_CODE=${{ needs.validate.outputs.version_code }}

      - name: "Upload Artifact"
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: pc-tool-kotlin/build/compose/binaries/${{ matrix.glob }}

  build-android:
    name: "Build Android & Root Module"
    needs: [validate, test]
    if: always() && needs.validate.result == 'success' && needs.test.result == 'success' && (github.event_name == 'push' || github.event.inputs.build_android == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: "Build"
        run: |
          ./gradlew buildAndroid buildModule \
            --configuration-cache \
            -PVERSION_NAME="${{ needs.validate.outputs.version_name }}" \
            -PVERSION_CODE=${{ needs.validate.outputs.version_code }}
      - uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            android-app/app/build/outputs/apk/release/app-release.apk
            build/distributions/inputblocker.zip

  release:
    name: "Publish Release"
    needs: [validate, build-pc-tool, build-android]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: raw-artifacts
      - name: "Stage Artifacts"
        shell: pwsh
        run: |
          $v = "${{ needs.validate.outputs.version_name }}"
          $do_android = "${{ github.event.inputs.build_android }}" -ne 'false'
          $do_windows = "${{ github.event.inputs.build_windows }}" -ne 'false'
          $do_linux = "${{ github.event.inputs.build_linux }}" -ne 'false'
          $do_macos = "${{ github.event.inputs.build_macos }}" -ne 'false'
          if ("${{ github.event_name }}" -eq "push") { $do_android = $true; $do_windows = $true; $do_linux = $true; $do_macos = $true }
          New-Item -ItemType Directory -Path "release-assets" -Force
          if ($do_android) {
              Copy-Item "raw-artifacts/android-artifacts/app-release.apk" "release-assets/InputBlocker-v$v.apk"
              Copy-Item "raw-artifacts/android-artifacts/inputblocker.zip" "release-assets/InputBlocker-v$v.zip"
          }
          if ($do_windows) {
              Copy-Item (Get-ChildItem "raw-artifacts/pc-tool-windows/*.exe")[0].FullName "release-assets/InputBlockerSetup-v$v.exe"
          }
          if ($do_linux) {
              $f = Get-ChildItem "raw-artifacts/pc-tool-linux/*.AppImage" -ErrorAction SilentlyContinue
              if ($f) { Copy-Item $f[0].FullName "release-assets/InputBlockerSetup-v$v.AppImage" }
          }
          if ($do_macos) {
              $f = Get-ChildItem "raw-artifacts/pc-tool-macos/*.dmg" -ErrorAction SilentlyContinue
              if ($f) { Copy-Item $f[0].FullName "release-assets/InputBlockerSetup-v$v.dmg" }
          }
      - name: "Verify Artifacts"
        shell: pwsh
        run: |
          $v = "${{ needs.validate.outputs.version_name }}"
          $do_android = "${{ github.event.inputs.build_android }}" -ne 'false'
          $do_windows = "${{ github.event.inputs.build_windows }}" -ne 'false'
          $is_push = "${{ github.event_name }}" -eq "push"
          $required = @()
          if ($do_android -or $is_push) { $required += "release-assets/InputBlocker-v$v.apk"; $required += "release-assets/InputBlocker-v$v.zip" }
          if ($do_windows -or $is_push) { $required += "release-assets/InputBlockerSetup-v$v.exe" }
          if ($required.Count -eq 0) { throw "Nothing to build." }
          foreach ($p in $required) {
              $f = Get-ChildItem $p -ErrorAction SilentlyContinue | Select-Object -First 1
              if (-not $f) { throw "Missing artifact: $p" }
          }
      - name: "ZIP Check"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        shell: bash
        run: |
          unzip -t "release-assets/InputBlocker-v${{ needs.validate.outputs.version_name }}.zip"
      - name: "APK Check"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        shell: bash
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify "release-assets/InputBlocker-v${{ needs.validate.outputs.version_name }}.apk"
      - name: "Checksums"
        shell: bash
        run: |
          cd release-assets
          sha256sum * > "checksums-v${{ needs.validate.outputs.version_name }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: release-v${{ needs.validate.outputs.version_name }}
          path: release-assets/*
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag_name }}
          name: "Release ${{ needs.validate.outputs.tag_name }}"
          body: ${{ needs.validate.outputs.release_notes }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          prerelease: ${{ github.event.inputs.prerelease || 'false' }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: "Deploy update.json"
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        shell: bash
        run: |
          V="${{ needs.validate.outputs.version_name }}"
          C="${{ needs.validate.outputs.version_code }}"
          REPO="${{ github.repository }}"
          APK_SHA=$(sha256sum "release-assets/InputBlocker-v$V.apk" | awk '{print $1}')
          ZIP_SHA=$(sha256sum "release-assets/InputBlocker-v$V.zip" | awk '{print $1}')
          mkdir -p pages-deploy
          echo "{\"version\": \"$V\", \"versionCode\": $C, \"apkUrl\": \"https://github.com/$REPO/releases/download/v$V/InputBlocker-v$V.apk\", \"zipUrl\": \"https://github.com/$REPO/releases/download/v$V/InputBlocker-v$V.zip\", \"changelog\": \"${{ needs.validate.outputs.release_notes }}\", \"apkSha256\": \"$APK_SHA\", \"zipSha256\": \"$ZIP_SHA\"}" > pages-deploy/update.json
      - uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-deploy
          keep_files: true
          commit_message: "deploy: update.json for v${{ needs.validate.outputs.version_name }}"
      - name: "Failure Issue"
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Release pipeline failed - v${{ needs.validate.outputs.version_name }}",
              body: `Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              labels: ["bug", "release"]
            })
