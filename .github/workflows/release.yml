name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.event.inputs.version }}"
            if [[ -z "$VERSION" ]]; then
              VERSION="dev-$(date +%Y%m%d-%H%M%S)"
            fi
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  build-csharp:
    needs: setup
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            artifact_name: InputBlockerSetup-windows-x64
            ext: .exe
          - os: windows-latest
            platform: win-arm64
            artifact_name: InputBlockerSetup-windows-arm64
            ext: .exe
          - os: ubuntu-latest
            platform: linux-x64
            artifact_name: InputBlockerSetup-linux-x64
            ext: ""
          - os: ubuntu-latest
            platform: linux-arm64
            artifact_name: InputBlockerSetup-linux-arm64
            ext: ""
          - os: macos-latest
            platform: osx-x64
            artifact_name: InputBlockerSetup-macos-intel
            ext: ""
          - os: macos-latest
            platform: osx-arm64
            artifact_name: InputBlockerSetup-macos-apple-silicon
            ext: ""

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build ${{ matrix.platform }}
        run: |
          mkdir -p release/${{ matrix.platform }}
          dotnet publish pc-tool-csharp/InputBlockerSetup.csproj -c Release -r ${{ matrix.platform }} --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o release/${{ matrix.platform }}

      - name: Make executable (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: chmod +x release/${{ matrix.platform }}/InputBlockerSetup

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: csharp-${{ matrix.platform }}
          path: release/${{ matrix.platform }}/InputBlockerSetup${{ matrix.ext }}

  build-java:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR
        run: |
          cd pc-tool-java
          chmod +x gradlew
          ./gradlew jar --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.os }}
          path: pc-tool-java/build/libs/InputBlockerSetup-1.0.0.jar

  build-apk:
    needs: setup
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  build-module:
    needs: [setup, build-apk]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: magisk-module/common/

      - name: Rename APK
        run: mv magisk-module/common/app-debug.apk magisk-module/common/InputBlocker.apk

      - name: Create full module
        run: |
          mkdir -p release
          cd magisk-module
          zip -r ../release/InputBlocker.zip . -x "*.DS_Store"

      - name: Create lite module
        run: |
          rm magisk-module/common/InputBlocker.apk
          cd magisk-module
          zip -r ../release/InputBlocker-lite.zip . -x "*.DS_Store"

      - name: Upload full module
        uses: actions/upload-artifact@v4
        with:
          name: module-full
          path: release/InputBlocker.zip

      - name: Upload lite module
        uses: actions/upload-artifact@v4
        with:
          name: module-lite
          path: release/InputBlocker-lite.zip
