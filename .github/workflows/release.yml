name: Release

# ============================================================================
# InputBlocker Release Workflow
# Automates building and releasing all components:
# - C# PC tools (Windows, Linux, macOS x64/arm64)
# - Java PC tool
# - Android APK
# - Root module with APK
# ============================================================================

on:
  # Trigger on version tags (e.g., v1.0.0)
  push:
    tags:
      - 'v*'
  
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version name (optional)'
        required: false
        default: ''
      release_notes:
        description: 'Additional release notes (markdown supported)'
        required: false
        default: ''
      draft:
        description: 'Create as draft (true/false)'
        required: false
        default: 'false'
      prerelease:
        description: 'Mark as pre-release (true/false)'
        required: false
        default: 'false'
      notify_issues:
        description: 'Notify open issues about release'
        required: false
        default: 'true'

# Use Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ============================================================================
# JOB: Setup - Determine version and release type
# ============================================================================
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_test: ${{ steps.version.outputs.is_test }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version and release type
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/tags/"* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            if [[ "$VERSION" == vtest* ]]; then
              echo "is_release=false" >> $GITHUB_OUTPUT
              echo "is_test=true" >> $GITHUB_OUTPUT
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "🧪 Test mode: Test tag detected - $VERSION (will create draft release)"
            else
              echo "is_release=true" >> $GITHUB_OUTPUT
              echo "is_test=false" >> $GITHUB_OUTPUT
              echo "version=$VERSION" >> $GITHUB_OUTPUT
              echo "📌 Release mode: Production tag detected - $VERSION"
            fi
          else
            VERSION="${{ github.event.inputs.version }}"
            if [[ -z "$VERSION" ]]; then
              VERSION="dev-$(date +%Y%m%d-%H%M%S)"
              echo "⚠️ No version specified - using development version: $VERSION"
            else
              echo "📌 Manual mode: Using custom version - $VERSION"
            fi
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_test=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Display version information
        run: |
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Is Release: ${{ steps.version.outputs.is_release }}"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"

# ============================================================================
# JOB: Build C# PC Tools
# Builds self-contained executables for Windows, Linux, and macOS
# ============================================================================
  build-csharp:
    needs: setup
    strategy:
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            platform: win-x64
            artifact_name: InputBlockerSetup-windows-x64
            ext: .exe
            display_name: "Windows x64"
          
          - os: windows-latest
            platform: win-arm64
            artifact_name: InputBlockerSetup-windows-arm64
            ext: .exe
            display_name: "Windows ARM64"
          
          # Linux builds
          - os: ubuntu-latest
            platform: linux-x64
            artifact_name: InputBlockerSetup-linux-x64
            ext: ""
            display_name: "Linux x64"
          
          - os: ubuntu-latest
            platform: linux-arm64
            artifact_name: InputBlockerSetup-linux-arm64
            ext: ""
            display_name: "Linux ARM64"
          
          # macOS builds
          - os: macos-latest
            platform: osx-arm64
            artifact_name: InputBlockerSetup-macos-apple-silicon
            ext: ""
            display_name: "macOS Apple Silicon"

    runs-on: ${{ matrix.os }}
    name: "Build C# Tool (${{ matrix.display_name }})"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build ${{ matrix.platform }}
        run: |
          echo "Building C# tool for ${{ matrix.platform }}..."
          mkdir -p release/${{ matrix.platform }}
          dotnet publish pc-tool-csharp/InputBlockerSetup.csproj -c Release -r ${{ matrix.platform }} --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:PublishTrimmed=true -p:TrimMode=Link -o release/${{ matrix.platform }}
          echo "Build completed for ${{ matrix.platform }}"

      - name: Make executable (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: chmod +x release/${{ matrix.platform }}/InputBlockerSetup

      - name: Rename artifact (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: mv release/${{ matrix.platform }}/InputBlockerSetup release/InputBlocker-Setup-${{ matrix.platform }}
        shell: bash

      - name: Rename artifact (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        run: mv release/${{ matrix.platform }}/InputBlockerSetup release/InputBlocker-Setup-${{ matrix.platform }}
        shell: bash

      - name: Rename artifact (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: mv release\${{ matrix.platform }}\InputBlockerSetup.exe release\InputBlocker-Setup-${{ matrix.platform }}.exe
        shell: pwsh

      - name: Upload artifact (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-Setup-${{ matrix.platform }}
          path: release/InputBlocker-Setup-${{ matrix.platform }}
          retention-days: 30

      - name: Upload artifact (macOS)
        if: ${{ matrix.os == 'macos-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-Setup-${{ matrix.platform }}
          path: release/InputBlocker-Setup-${{ matrix.platform }}
          retention-days: 30

      - name: Upload artifact (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-Setup-${{ matrix.platform }}.exe
          path: release/InputBlocker-Setup-${{ matrix.platform }}.exe
          retention-days: 30

# ============================================================================
# JOB: Build Java PC Tool
# Builds JAR file for Java-based setup tool
# ============================================================================
  build-java:
    needs: setup
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}
    name: "Build Java Tool (${{ matrix.os }})"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR
        run: |
          echo "🔨 Building Java tool..."
          cd pc-tool-java
          chmod +x gradlew
          ./gradlew jar --no-daemon
          echo "✅ Java tool built successfully"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-Setup-Java-${{ matrix.os }}
          path: pc-tool-java/build/libs/InputBlockerSetup-1.0.0.jar
          retention-days: 30
        if: ${{ always() }}

# ============================================================================
# JOB: Build Android APK
# Builds debug APK for testing and distribution
# ============================================================================
  build-apk:
    needs: setup
    runs-on: ubuntu-latest
    name: "Build Android APK"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools'

      - name: Build debug APK
        run: |
          echo "Building Android APK..."
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --rerun-tasks --stacktrace --warning-mode none
          echo "APK built successfully"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-debug.apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
        if: ${{ always() }}

# ============================================================================

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-RootModule-Full
          path: release/InputBlocker.zip
          retention-days: 30
        if: ${{ always() }}

# ============================================================================
# JOB: Build Root Module
# Packages the module with APK for Magisk/KernelSU/APatch/SuperSU
# ============================================================================
  build-module:
    needs: [setup, build-apk]
    runs-on: ubuntu-latest
    name: "Build Root Module"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: InputBlocker-debug.apk
          path: module/common/

      - name: Rename APK to InputBlocker.apk
        run: mv module/common/app-debug.apk module/common/InputBlocker.apk

      - name: Verify APK
        run: |
          ls -la module/common/
          file module/common/InputBlocker.apk

      - name: Create module ZIP
        run: |
          mkdir -p release
          cd module
          zip -r ../release/InputBlocker.zip . -x "*.DS_Store" "*.git*"
          unzip -l ../release/InputBlocker.zip

      - name: Upload module
        uses: actions/upload-artifact@v4
        with:
          name: InputBlocker-RootModule-Full
          path: release/InputBlocker.zip
          retention-days: 30
        if: always()

# ============================================================================
# JOB: Create GitHub Release
# Creates release with all artifacts for all version tags
# Test tags (vtest*) create draft releases
# Production tags (v*) create regular releases
# ============================================================================
  create-release:
    needs: [setup, build-csharp, build-java, build-module]
    runs-on: ubuntu-latest
    name: "Create GitHub Release"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Determine release type
        id: release_type
        run: |
          if [[ "${{ needs.setup.outputs.is_test }}" == "true" ]]; then
            echo "draft=true" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "🧪 Creating draft release for test tag"
          else
            echo "draft=false" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "📦 Creating production release"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release files
        run: |
          echo "📁 Preparing release files..."
          mkdir -p release
          
          # Copy all artifacts to release directory
          for dir in artifacts/*/; do
            filename=$(basename "$dir")
            if [ -f "$dir$filename" ]; then
              cp "$dir$filename" "release/"
            else
              # Handle case where artifact is in root of directory
              for f in "$dir"*; do
                if [ -f "$f" ]; then
                  cp "$f" "release/"
                fi
              done
            fi
          done
          
          echo "✅ Release files prepared:"
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.sha256
          cat checksums.sha256
          cd ..

      - name: Verify release assets
        run: |
          echo "Verifying release assets..."
          cd release
          echo "Checking expected files:"
          ls -la
          
          # Check essential files exist
          test -f checksums.sha256 && echo "✅ checksums.sha256 exists" || echo "❌ checksums.sha256 missing"
          test -f InputBlocker.zip && echo "✅ InputBlocker.zip exists" || echo "❌ InputBlocker.zip missing"
          test -f InputBlocker-debug.apk && echo "✅ InputBlocker-debug.apk exists" || echo "❌ InputBlocker-debug.apk missing"
          
          # Verify checksums are valid
          echo "Verifying checksums..."
          sha256sum -c checksums.sha256 || echo "⚠️ Checksum verification failed (non-critical)"
          
          cd ..
          echo "✅ Asset verification complete"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: ${{ github.event.inputs.draft == 'true' || steps.release_type.outputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' || steps.release_type.outputs.prerelease == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
