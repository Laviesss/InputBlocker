name: Release

# ============================================================================
# InputBlocker Release Workflow
# Automates building and releasing all components with Dynamic Versioning
# ============================================================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - csharp
          - java
          - module
      version:
        description: 'Custom version name (optional)'
        required: false
        default: ''
      release_notes:
        description: 'Additional release notes (markdown supported)'
        required: false
        default: ''
      draft:
        description: 'Create as draft (true/false)'
        required: false
        default: 'false'
      prerelease:
        description: 'Mark as pre-release (true/false)'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_test: ${{ steps.version.outputs.is_test }}
      build_type: ${{ steps.build_type.outputs.build_type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version and build type
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            BUILD_TYPE="all"
          else
            VERSION="${{ github.event.inputs.version }}"
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
            if [ -z "$VERSION" ]; then
              VERSION="v0.0.0-dev"
            fi
          fi
          
          VERSION_CODE=$(git rev-list --count HEAD)
          
          if [[ "$VERSION" == vtest* ]]; then
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_test=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "is_test=false" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION (Code: $VERSION_CODE) | Build: $BUILD_TYPE"

  inject_version:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Inject Version into Files
        run: |
          VERSION=${{ needs.setup.outputs.version }}
          VCODE=${{ needs.setup.outputs.version_code }}
          
          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module/module.prop
          sed -i "s/\"version\": \".*\",/\"version\": \"$VERSION\",/" module/update.json
          sed -i "s/\"versionCode\": [0-9]*,/\"versionCode\": $VCODE,/" module/update.json
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" android-app/app/build.gradle
          sed -i "s/versionCode = [0-9]*/versionCode $VCODE/" android-app/app/build.gradle
      - name: Upload Modified Files
        uses: actions/upload-artifact@v4
        with:
          name: versioned-files
          path: |
            module/module.prop
            module/update.json
            android-app/app/build.gradle

  build-android:
    needs: [setup, inject_version]
    if: needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'android'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  build-csharp:
    needs: [setup, inject_version]
    if: needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'csharp'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build C# Tools
        run: |
          cd pc-tool-csharp
          dotnet publish -c Release -r win-x64 -o ../release/csharp/win-x64 --self-contained true -p:PublishSingleFile=true
          dotnet publish -c Release -r win-arm64 -o ../release/csharp/win-arm64 --self-contained true -p:PublishSingleFile=true
          dotnet publish -c Release -r linux-x64 -o ../release/csharp/linux-x64 --self-contained true -p:PublishSingleFile=true
          dotnet publish -c Release -r linux-arm64 -o ../release/csharp/linux-arm64 --self-contained true -p:PublishSingleFile=true
          dotnet publish -c Release -r osx-x64 -o ../release/csharp/osx-x64 --self-contained true -p:PublishSingleFile=true
          dotnet publish -c Release -r osx-arm64 -o ../release/csharp/osx-arm64 --self-contained true -p:PublishSingleFile=true
      - name: Upload C# Binaries
        uses: actions/upload-artifact@v4
        with:
          name: csharp-binaries
          path: release/csharp/

  build-java:
    needs: [setup, inject_version]
    if: needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'java'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build Java Tool
        run: |
          cd pc-tool-java
          chmod +x gradlew
          ./gradlew assemble
      - name: Upload Java Binaries
        uses: actions/upload-artifact@v4
        with:
          name: java-binaries
          path: pc-tool-java/build/libs/*.jar

  build-module:
    needs: [setup, inject_version, build-android]
    if: needs.setup.outputs.build_type == 'all' || needs.setup.outputs.build_type == 'module'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: module/common/
      - name: Build Root Module ZIP
        run: |
          mkdir -p release
          zip -r release/InputBlocker.zip module/ -i "module/*"
      - name: Upload Module
        uses: actions/upload-artifact@v4
        with:
          name: root-module
          path: release/InputBlocker.zip

  create-release:
    needs: [setup, build-android, build-csharp, build-java, build-module]
    if: needs.setup.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: Release ${{ needs.setup.outputs.version }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          prerelease: ${{ github.event.inputs.prerelease || 'false' }}
          generate_release_notes: true
          files: release/**
