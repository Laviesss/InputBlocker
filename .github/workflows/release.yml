name: Release

# ============================================================================
# InputBlocker Release Workflow
# Automates building and releasing all components with Dynamic Versioning
# ============================================================================

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version name (optional)'
        required: false
        default: ''
      release_notes:
        description: 'Additional release notes (markdown supported)'
        required: false
        default: ''
      draft:
        description: 'Create as draft (true/false)'
        required: false
        default: 'false'
      prerelease:
        description: 'Mark as pre-release (true/false)'
        required: false
        default: 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_test: ${{ steps.version.outputs.is_test }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version and version code
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION="v0.0.0-dev"
            fi
          fi
          
          # Calculate version code as total number of commits on main branch
          VERSION_CODE=$(git rev-list --count HEAD)
          
          if [[ "$VERSION" == vtest* ]]; then
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_test=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "is_test=false" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📌 Version: $VERSION (Code: $VERSION_CODE)"

  inject_version:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Inject Version into Files
        run: |
          VERSION=${{ needs.setup.outputs.version }}
          VCODE=${{ needs.setup.outputs.version_code }}
          
          # Update module.prop
          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module/module.prop
          
          # Update update.json
          sed -i "s/\"version\": \".*\",/\"version\": \"$VERSION\",/" module/update.json
          sed -i "s/\"versionCode\": [0-9]*,/\"versionCode\": $VCODE,/" module/update.json
          
          # Update android app build.gradle
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" android-app/app/build.gradle
          sed -i "s/versionCode = [0-9]*/versionCode $VCODE/" android-app/app/build.gradle
          
          # Commit the version changes to a temporary branch or just upload as artifact
          # For simplicity in the build chain, we will upload these modified files as artifacts
          # and subsequent jobs will download them.
          
      - name: Upload Modified Files
        uses: actions/upload-artifact@v4
        with:
          name: versioned-files
          path: |
            module/module.prop
            module/update.json
            android-app/app/build.gradle

  build-android:
    needs: [setup, inject_version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Modified Files
        uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Build APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  # ... Other build jobs (C#, Java) would follow the same pattern:
  # 1. Download versioned-files
  # 2. Build
  # 3. Upload artifact

  create-release:
    needs: [setup, build-android] # Add other build jobs here
    runs-on: ubuntu-latest
    if: needs.setup.outputs.is_release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: Release ${{ needs.setup.outputs.version }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          prerelease: ${{ github.event.inputs.prerelease || 'false' }}
          generate_release_notes: true
          files: release/**
