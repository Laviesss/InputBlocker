name: "?? Production Release Pipeline"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., 1.0.1)'
        required: true
      version_code:
        description: 'Version Code (Integer)'
        required: true
      release_notes:
        description: 'Release notes (Markdown)'
        required: false
        default: ''
      draft:
        description: 'Create as a Draft?'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark as Pre-release?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: "?? Build & Publish"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "?? Setup Environment"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "?? Validate Versioning"
        id: versioning
        shell: pwsh
        run: |
          $version_name = "${{ github.event.inputs.version_name }}"
          $version_code = "${{ github.event.inputs.version_code }}"
          
          # Handle Tag Push
          if ("${{ github.event_name }}" -eq "push") {
              $tag = "${{ github.ref_name }}"
              $version_name = $tag.TrimStart('v')
          }
          
          # Strict Validation: No fallbacks
          if ([string]::IsNullOrWhiteSpace($version_name)) {
              throw "CRITICAL ERROR: VERSION_NAME is missing. You must provide a version name in the inputs or use a git tag (v*)."
          }
          
          if ([string]::IsNullOrWhiteSpace($version_code)) {
              throw "CRITICAL ERROR: VERSION_CODE is missing. You must provide a numeric version code in the workflow inputs. Git tags do not provide version codes, so please use 'Run workflow' for production releases."
          }
          
          echo "VERSION_NAME=$version_name" >> $env:GITHUB_OUTPUT
          echo "VERSION_CODE=$version_code" >> $env:GITHUB_OUTPUT
          echo "TAG_NAME=v$version_name" >> $env:GITHUB_OUTPUT

      - name: "?? Build All Artifacts"
        shell: pwsh
        run: |
          .\gradlew buildAll -PVERSION_NAME="${{ steps.versioning.outputs.VERSION_NAME }}" -PVERSION_CODE=${{ steps.versioning.outputs.VERSION_CODE }}

      - name: "?? Verify Artifacts"
        shell: pwsh
        run: |
          $apk = Get-ChildItem "android-app/app/build/outputs/apk/release/*.apk"
          $exe = Get-ChildItem "pc-tool-kotlin/build/compose/binaries/*.exe"
          $zip = Get-ChildItem "build/distributions/inputblocker.zip"
          
          if (-not $apk) { throw "Android APK not found!" }
          if (-not $exe) { throw "PC Tool EXE not found!" }
          if (-not $zip) { throw "Root Module ZIP not found!" }
          
          echo "All artifacts verified successfully."

      - name: "?? Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.TAG_NAME }}
          name: "Release ${{ steps.versioning.outputs.TAG_NAME }}"
          body: ${{ github.event.inputs.release_notes || 'Automated production release.' }}
          draft: ${{ github.event.inputs.draft || 'false' }}
          prerelease: ${{ github.event.inputs.prerelease || 'false' }}
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            pc-tool-kotlin/build/compose/binaries/*.exe
            build/distributions/inputblocker.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
