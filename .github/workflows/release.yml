name: Release

# ============================================================================
# InputBlocker Professional Release Workflow
# A high-fidelity CI/CD pipeline for root-agnostic Android modules.
# ============================================================================

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      build_type:
        description: Components to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - csharp
          - java
          - module

      version:
        description: Custom version
        required: false
        default: ''

      version_code:
        description: Manual version code
        required: false
        default: ''

      release_notes:
        description: Release notes
        required: false
        default: ''

      draft:
        description: Draft release
        required: false
        default: false
        type: boolean

      prerelease:
        description: Pre-release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_NAME: InputBlocker

jobs:
  setup:
    name: Setup & Versioning
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.vars.outputs.version }}
      clean_version: ${{ steps.vars.outputs.clean_version }}
      version_code: ${{ steps.vars.outputs.version_code }}
      build_type: ${{ steps.vars.outputs.build_type }}
      draft: ${{ steps.vars.outputs.draft }}
      prerelease: ${{ steps.vars.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"
            BUILD_TYPE="all"
          else
            VERSION="${{ github.event.inputs.version }}"
            BUILD_TYPE="${{ github.event.inputs.build_type }}"
          fi

          [[ -z "$VERSION" ]] && VERSION="v0.0.0-dev"

          VERSION=$(echo "$VERSION" | tr -d '\r' | xargs)

          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

          CLEAN_VERSION="${VERSION#v}"

          if [[ -n "${{ github.event.inputs.version_code }}" ]]; then
            VCODE="${{ github.event.inputs.version_code }}"
          else
            VCODE=$(git rev-list --count HEAD)
          fi

          VCODE=$(echo "$VCODE" | tr -dc '0-9')

          if [[ -z "$VCODE" ]]; then
            echo "Invalid version code"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "clean_version=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VCODE" >> "$GITHUB_OUTPUT"
          echo "build_type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"
          echo "draft=${{ github.event.inputs.draft || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ github.event.inputs.prerelease || 'false' }}" >> "$GITHUB_OUTPUT"

          echo "🚀 Finalized Version: $VERSION (Clean: $CLEAN_VERSION, Code: $VCODE) | Build: $BUILD_TYPE"

  inject-version:
    name: Inject Versions
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Inject versions
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.setup.outputs.version }}"
          CLEAN_VERSION="${{ needs.setup.outputs.clean_version }}"
          VCODE="${{ needs.setup.outputs.version_code }}"

          sed -i "s/^version=.*/version=$VERSION/" module/module.prop
          sed -i "s/^versionCode=.*/versionCode=$VCODE/" module/module.prop

          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" module/update.json
          sed -i "s/\"versionCode\": [0-9]*/\"versionCode\": $VCODE/" module/update.json

          sed -i "s/versionName \".*\"/versionName \"$CLEAN_VERSION\"/" android-app/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $VCODE/" android-app/app/build.gradle

          sed -i "s/<Version>.*<\/Version>/<Version>$CLEAN_VERSION<\/Version>/" pc-tool-csharp/InputBlockerSetup.csproj

      - uses: actions/upload-artifact@v4
        with:
          name: versioned-files
          path: |
            module/module.prop
            module/update.json
            android-app/app/build.gradle
            pc-tool-csharp/InputBlockerSetup.csproj

  build-android:
    name: Build Android
    needs: [setup, inject-version]

    if: |
      needs.setup.outputs.build_type == 'all' ||
      needs.setup.outputs.build_type == 'android' ||
      needs.setup.outputs.build_type == 'module'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build release APK
        shell: bash
        run: |
          set -euo pipefail

          cd android-app
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-apk
          path: android-app/app/build/outputs/apk/release/*.apk

  sign-android:
    name: Sign Android APK
    needs: [setup, build-android]

    if: |
      always() &&
      (
        needs.setup.outputs.build_type == 'all' ||
        needs.setup.outputs.build_type == 'android' ||
        needs.setup.outputs.build_type == 'module'
      )

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: unsigned-apk
          path: unsigned

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: unsigned
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare signed APK
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.setup.outputs.version }}"

          mkdir -p release

          APK=$(find signed -name "*.apk" | head -n 1)

          if [[ -z "$APK" ]]; then
            echo "Signed APK not found"
            exit 1
          fi

          mv "$APK" "release/InputBlocker-${VERSION}.apk"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: release/*.apk

  build-csharp:
    name: Build C#
    needs: [setup, inject-version]

    if: |
      needs.setup.outputs.build_type == 'all' ||
      needs.setup.outputs.build_type == 'csharp'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish binaries
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release/csharp

          cd pc-tool-csharp

          for rid in win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish \
              -c Release \
              -r "$rid" \
              --self-contained true \
              -p:PublishSingleFile=true \
              -o "../release/csharp/$rid"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: csharp
          path: release/csharp/

  build-java:
    name: Build Java
    needs: [setup, inject-version]

    if: |
      needs.setup.outputs.build_type == 'all' ||
      needs.setup.outputs.build_type == 'java'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: versioned-files
          path: .

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build Java tool
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.setup.outputs.version }}"

          cd pc-tool-java
          chmod +x gradlew
          ./gradlew assemble

          mkdir -p ../release/java

          cp build/libs/*.jar "../release/java/InputBlockerSetup-${VERSION}.jar"

      - uses: actions/upload-artifact@v4
        with:
          name: java
          path: release/java/

  build-module:
    name: Build Root Module
    needs: [setup, sign-android]

    if: |
      always() &&
      (
        needs.setup.outputs.build_type == 'all' ||
        needs.setup.outputs.build_type == 'module'
      )

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: signed-apk
          path: signed-apk

      - name: Package module
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.setup.outputs.version }}"

          APK=$(find signed-apk -name "*.apk" | head -n 1)

          if [[ -z "$APK" ]]; then
            echo "No signed APK found"
            exit 1
          fi

          cp "$APK" module/common/InputBlocker.apk

          mkdir -p release

          cd module
          zip -r "../release/InputBlocker-${VERSION}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: module
          path: release/*.zip

  checksums:
    name: Generate Checksums
    needs:
      - setup
      - sign-android
      - build-csharp
      - build-java
      - build-module

    if: |
      always() &&
      needs.setup.outputs.build_type == 'all'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release

          find artifacts -type f -exec sha256sum {} \; > release/checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/checksums.txt

  release:
    name: GitHub Release

    needs:
      - setup
      - sign-android
      - build-csharp
      - build-java
      - build-module
      - checksums

    if: always()

    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release

          find artifacts -type f -exec cp {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          name: Release ${{ needs.setup.outputs.version }}
          body: ${{ github.event.inputs.release_notes || 'Automated release.' }}
          draft: ${{ needs.setup.outputs.draft }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          generate_release_notes: true
          files: release/*

      - name: Generate update.json
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.setup.outputs.version }}"
          VCODE="${{ needs.setup.outputs.version_code }}"

          mkdir -p gh-pages

          cat > gh-pages/update.json <<EOF
          {
            "version": "$VERSION",
            "versionCode": $VCODE,
            "zipUrl": "https://github.com/${{ github.repository }}/releases/download/${VERSION}/InputBlocker-${VERSION}.zip",
            "changelog": "https://github.com/${{ github.repository }}/releases/tag/${VERSION}",
            "support": ["Magisk", "KernelSU", "APatch"],
            "minApi": 23
          }
          EOF

      - name: Deploy update.json
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: gh-pages
          clean: true
