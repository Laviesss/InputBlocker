name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            VERSION="${{ github.event.inputs.version }}"
            if [[ -z "$VERSION" ]]; then
              VERSION="dev-$(date +%Y%m%d-%H%M%S)"
            fi
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.version.outputs.is_release == 'true'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          release_name: InputBlocker ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

  build-csharp:
    needs: setup
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            artifact_name: InputBlockerSetup-windows-x64
            ext: exe
          - os: windows-latest
            platform: win-arm64
            artifact_name: InputBlockerSetup-windows-arm64
            ext: exe
          - os: ubuntu-latest
            platform: linux-x64
            artifact_name: InputBlockerSetup-linux-x64
            ext: ""
          - os: ubuntu-latest
            platform: linux-arm64
            artifact_name: InputBlockerSetup-linux-arm64
            ext: ""
          - os: macos-latest
            platform: osx-x64
            artifact_name: InputBlockerSetup-macos-intel
            ext: ""
          - os: macos-latest
            platform: osx-arm64
            artifact_name: InputBlockerSetup-macos-apple-silicon
            ext: ""

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build ${{ matrix.platform }}
        run: |
          mkdir -p release/${{ matrix.platform }}
          dotnet publish pc-tool-csharp/InputBlockerSetup.csproj -c Release -r ${{ matrix.platform }} --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o release/${{ matrix.platform }}

      - name: Make executable (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: chmod +x release/${{ matrix.platform }}/InputBlockerSetup

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: csharp-${{ matrix.platform }}
          path: release/${{ matrix.platform }}/InputBlockerSetup{{ matrix.ext && format('.{0}', matrix.ext) }}

  build-java:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build JAR
        run: |
          cd pc-tool-java
          chmod +x gradlew
          ./gradlew jar --no-daemon -q

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.os }}
          path: pc-tool-java/build/libs/InputBlockerSetup-1.0.0.jar

  build-module:
    needs: setup
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon -q

      - name: Create module
        run: |
          mkdir -p magisk-module/common
          cp android-app/app/build/outputs/apk/release/app-release.apk magisk-module/common/InputBlocker.apk
          cd magisk-module
          zip -r ../release/InputBlocker.zip . -x "*.DS_Store"
          rm common/InputBlocker.apk
          zip -r ../release/InputBlocker-lite.zip . -x "*.DS_Store"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-app/app/build/outputs/apk/release/app-release.apk

      - name: Upload modules
        uses: actions/upload-artifact@v4
        with:
          name: module-full
          path: release/InputBlocker.zip

      - name: Upload lite module
        uses: actions/upload-artifact@v4
        with:
          name: module-lite
          path: release/InputBlocker-lite.zip
