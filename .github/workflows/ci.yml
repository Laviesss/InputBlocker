name: "CI Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: "Test & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Java"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Make Gradle wrapper executable"
        run: chmod +x gradlew

      - name: "Run Tests & Lint"
        run: ./gradlew test lint -PVERSION_NAME=0.0.0 -PVERSION_CODE=1

      - name: "Build APK"
        run: ./gradlew assembleDebug -PVERSION_NAME=0.0.0 -PVERSION_CODE=1

      - name: "Upload Lint Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: '**/build/reports/lint-results*'
          retention-days: 7

      - name: "Upload APK"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: '**/build/outputs/apk/debug/app-debug.apk'
          retention-days: 7
